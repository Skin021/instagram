<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Você começou a seguir esta conta.</title>

<style>

body{
    background-color: black;
}

.painel{
    background-color: white;
    margin: auto;
    width: 500px;
    height: 500px;
    border-radius: 20px;
    text-align: center;
    padding-top: 60px;
    font-family: Arial, sans-serif;
}

.perfil{
    width:140px;
    height:140px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid white;
    margin-bottom:20px;
}

#deixardeseguir{
    position: absolute;
    height: 50px;
    width: 160px;
    background-color: blueviolet;
    border-color: aqua;
    border-radius: 10px;
    color: beige;

    left: 65%;
    top: 65%;
    transform: translate(-50%, -50%);
}

</style>
</head>

<body>

<div class="painel">

    <h1>Você começou a seguir esta conta</h1>

    <!-- IMAGEM DO PERFIL -->
    <img src="https://img.freepik.com/vetores-premium/icone-do-logotipo-do-instagram_1273375-1177.jpg?semt=ais_hybrid&w=740&q=80" class="perfil">

    <br><br>

    <button onmouseover="fuja()" id="deixardeseguir">
        Deixar de seguir
    </button>

</div>

<script>

function fuja(){

    var botao = document.getElementById("deixardeseguir");

    var larguraJanela = window.innerWidth;
    var alturaJanela = window.innerHeight;

    var maxX = larguraJanela - botao.offsetWidth;
    var maxY = alturaJanela - botao.offsetHeight;

    var aleatorioX = Math.floor(Math.random() * maxX);
    var aleatorioY = Math.floor(Math.random() * maxY);

    botao.style.left = aleatorioX + "px";
    botao.style.top = aleatorioY + "px";

}

</script>

</body>
</html>
